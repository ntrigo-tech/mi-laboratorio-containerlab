name: lab-routing

topology:
  nodes:

    r1:
      kind: linux
      image: frrouting/frr:latest

    sw1:
      kind: cisco_iol
      image: iosvl2:latest

    sw2:
      kind: cisco_iol
      image: iosvl2:latest

    pc1:
      kind: linux
      image: alpine:latest

    pc2:
      kind: linux
      image: alpine:latest

    pc3:
      kind: linux
      image: alpine:latest

    php:
      kind: linux
      image: php:apache

  links:

    # Router -> SW1
    - endpoints: ["r1:eth1","sw1:Ethernet0/0"]

    # Router -> SW2
    - endpoints: ["r1:eth2","sw2:Ethernet0/0"]

    # Trunk entre switches
    - endpoints: ["sw1:Ethernet0/23","sw2:Ethernet0/23"]

    # SW1
    - endpoints: ["pc1:eth1","sw1:Ethernet0/1"]
    - endpoints: ["pc2:eth1","sw1:Ethernet0/2"]

    # SW2
    - endpoints: ["pc3:eth1","sw2:Ethernet0/1"]
    - endpoints: ["php:eth1","sw2:Ethernet0/2"]
